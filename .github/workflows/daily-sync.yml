# ============================================
# SCHEMEATLAS — DAILY SYNC & ENRICHMENT
# Runs every day at 02:00 AM IST (20:30 UTC)
# .github/workflows/daily-sync.yml
# ============================================

name: Daily Scheme Sync & AI Enrichment

on:
  schedule:
    - cron: '30 20 * * *'   # 02:00 AM IST
  workflow_dispatch:        # Manual trigger

jobs:
  sync-and-enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: 🔍 Discovery & Sync
        working-directory: agents
        run: |
          npm install
          node findSchemes.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          APISETU_KEY: ${{ secrets.APISETU_KEY }}

      - name: 💎 AI Article Enrichment (State-Specific)
        run: node scripts/state-enrichment.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 📝 Q&A Content Generation (Global)
        run: node scripts/generate-content.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Report Status
        if: always()
        run: |
          echo "Pipeline finished at $(date)"
