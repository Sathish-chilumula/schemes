# ============================================
# SCHEMEATLAS — NEW SCHEMES V2 PIPELINE
# Runs every 6 hours automatically (offset by 3 hrs from Master Pipeline)
# .github/workflows/new-schemes-pipeline.yml
# ============================================

name: New Schemes Content V2 Pipeline

on:
  schedule:
    - cron: '0 3,9,15,21 * * *'   # Every 6 hours, offset from Master Pipeline
  workflow_dispatch:          # Manual trigger anytime
    inputs:
      force_scheme_slug:
        description: 'Optional: Force run for a specific scheme slug'
        required: false
        type: string

jobs:
  generate-content:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install @supabase/supabase-js openai axios @google/generative-ai

      # ==================================
      # CONTENT GENERATION V2
      # ==================================
      - name: Run Content Generator V2
        run: node scripts/generate-scheme-content-v2.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FORCE_SCHEME_SLUG: ${{ github.event.inputs.force_scheme_slug }}

      # ==================================
      # DEPLOY (Cloudflare Pages)
      # ==================================
      - name: Trigger Cloudflare Pages Rebuild
        if: always()
        run: |
          if [ -n "$DEPLOY_HOOK_URL" ]; then
            echo "🚀 Triggering Cloudflare Pages rebuild via Deploy Hook..."
            curl -s -X POST "$DEPLOY_HOOK_URL" | jq .
            echo "✅ Rebuild triggered!"
          else
            echo "⚠️  CLOUDFLARE_DEPLOY_HOOK_URL secret is not set."
          fi
        env:
          DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}

      - name: Pipeline Report
        if: always()
        run: |
          echo "Pipeline completed at $(date)"
