# ============================================
# SCHEMEATLAS — MASTER PIPELINE
# Runs every 6 hours automatically
# .github/workflows/automation-pipeline.yml
# ============================================

name: Master Automation Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:          # Manual trigger anytime

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Root Dependencies (Scripts)
        run: npm install @supabase/supabase-js openai node-fetch

      - name: Install Agent Dependencies
        working-directory: agents
        run: npm install

      # ==================================
      # STEP 1: DISCOVERY
      # ==================================
      - name: Stage 1 - Scheme Discovery Agent
        working-directory: agents
        run: node findSchemes.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          APISETU_KEY: ${{ secrets.APISETU_KEY }}

      # ==================================
      # STEP 2: ENRICHMENT
      # ==================================
      - name: Stage 2 - State Enrichment
        run: node scripts/state-enrichment.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # ==================================
      # STEP 3: CONTENT GENERATION V2 (New Schemes Only)
      # ==================================
      - name: Stage 3 - Content Writing & Translation V2
        run: node scripts/generate-scheme-content-v2.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # ==================================
      # STEP 4: DEDUPLICATION & SEO CLEANUP
      # ==================================
      - name: Stage 4 - Deduplication & SEO Cleanup
        run: node scripts/cleanup-schemes.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # ==================================
      # STEP 5: DEPLOY (Cloudflare Pages)
      # ==================================
      # Requires a one-time setup: create a Deploy Hook in the Cloudflare Pages
      # dashboard (Settings > Builds & deployments > Deploy Hooks > Add Hook)
      # then add it as CLOUDFLARE_DEPLOY_HOOK_URL in GitHub repository secrets.
      # All pages already use Edge Runtime so new content appears immediately
      # in the DB — this rebuild is mainly to keep code + sitemap caches fresh.
      - name: Stage 5 - Trigger Cloudflare Pages Rebuild
        if: always()
        run: |
          if [ -n "$DEPLOY_HOOK_URL" ]; then
            echo "🚀 Triggering Cloudflare Pages rebuild via Deploy Hook..."
            curl -s -X POST "$DEPLOY_HOOK_URL" | jq .
            echo "✅ Rebuild triggered!"
          else
            echo "⚠️  CLOUDFLARE_DEPLOY_HOOK_URL secret is not set."
            echo "    To enable automatic Cloudflare rebuilds after each pipeline run:"
            echo "    1. Go to: Cloudflare Pages → your project → Settings → Builds & deployments"
            echo "    2. Under 'Deploy Hooks', click 'Add Hook' → name it 'Pipeline' → Save"
            echo "    3. Copy the generated URL and add it as CLOUDFLARE_DEPLOY_HOOK_URL"
            echo "       in: GitHub repo → Settings → Secrets and variables → Actions"
            echo "    NOTE: New schemes still appear live (Edge Runtime) without this rebuild."
          fi
        env:
          DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}


      - name: Pipeline Report
        if: always()
        run: |
          echo "Pipeline completed at $(date)"
