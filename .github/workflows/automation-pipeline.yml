# ============================================
# SCHEMEATLAS — MASTER PIPELINE
# Runs every 6 hours automatically
# .github/workflows/automation-pipeline.yml
# ============================================

name: Master Automation Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:          # Manual trigger anytime

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Root Dependencies (Scripts)
        run: npm install @supabase/supabase-js openai node-fetch

      - name: Install Agent Dependencies
        working-directory: agents
        run: npm install

      # ==================================
      # STAGE 1: DISCOVERY
      # ==================================
      - name: Stage 1 - Scheme Discovery Agent
        id: stage1
        continue-on-error: true
        working-directory: agents
        run: node findSchemes.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          APISETU_KEY: ${{ secrets.APISETU_KEY }}

      - name: Stage 1 - Report Status
        if: always()
        run: |
          if [ "${{ steps.stage1.outcome }}" == "success" ]; then
            echo "✅ Stage 1 passed"
          else
            echo "⚠️  Stage 1 failed - proceeding to Stage 2 (enrichment only mode)"
          fi


      # ==================================
      # STAGE 3: CONTENT GENERATION V2
      # ==================================
      - name: Stage 3 - Content Writing & Translation V2
        id: stage3
        continue-on-error: true
        run: node scripts/generate-scheme-content-v2.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Stage 3 - Report Status
        if: always()
        run: |
          if [ "${{ steps.stage3.outcome }}" == "success" ]; then
            echo "✅ Stage 3 passed"
          else
            echo "⚠️  Stage 3 failed - proceeding to cleanup"
          fi

      # ==================================
      # STAGE 4: DEDUPLICATION & SEO CLEANUP
      # ==================================
      - name: Stage 4 - Deduplication & SEO Cleanup
        id: stage4
        continue-on-error: true
        run: node scripts/cleanup-schemes.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Stage 4 - Report Status
        if: always()
        run: |
          if [ "${{ steps.stage4.outcome }}" == "success" ]; then
            echo "✅ Stage 4 passed"
          else
            echo "⚠️  Stage 4 failed - triggering rebuild anyway"
          fi

      # ==================================
      # STAGE 5: DEPLOY (Always run)
      # ==================================
      - name: Stage 5 - Trigger Cloudflare Pages Rebuild
        if: always()
        run: |
          if [ -n "$DEPLOY_HOOK_URL" ]; then
            echo "🚀 Triggering Cloudflare Pages rebuild via Deploy Hook..."
            curl -s -X POST "$DEPLOY_HOOK_URL" | jq .
            echo "✅ Rebuild triggered!"
          else
            echo "⚠️  CLOUDFLARE_DEPLOY_HOOK_URL secret not set"
          fi
        env:
          DEPLOY_HOOK_URL: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}

      # ==================================
      # FINAL SUMMARY
      # ==================================
      - name: Pipeline Summary
        if: always()
        run: |
          echo "📊 Pipeline Execution Summary:"
          echo "================================"
          echo "Stage 1 (Discovery):  ${{ steps.stage1.outcome }}"
          echo "Stage 2 (Enrichment): ${{ steps.stage2.outcome }}"
          echo "Stage 3 (Content):    ${{ steps.stage3.outcome }}"
          echo "Stage 4 (Cleanup):    ${{ steps.stage4.outcome }}"
          echo "Stage 5 (Deploy):     Always runs"
          echo "================================"
          echo "Pipeline completed at $(date)"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Pipeline had failures. Check logs for details."
          exit 1
