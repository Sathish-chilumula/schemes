# ============================================
# SCHEMEATLAS — JOB 1: SCHEME CONTENT WRITER
# Purpose : Write English-only content for new unwritten schemes
# AI      : Groq llama-3.3-70b (primary) → OpenAI gpt-4o-mini (fallback)
# Batch   : 15 schemes per run | Skips if nothing new (saves API budget)
# Runs    : Every 6 hours automatically
# ============================================

name: "Job 1: Scheme Content Writer (English)"

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force_slug:
        description: 'Force a specific scheme slug (optional)'
        required: false

jobs:
  write-english-content:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install @supabase/supabase-js axios

      - name: Write English scheme content
        run: node scripts/generate-scheme-content-en.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FORCE_SCHEME_SLUG: ${{ github.event.inputs.force_slug }}

      - name: Report status
        if: always()
        run: echo "✅ Job 1 (English Writer) completed at $(date)"
